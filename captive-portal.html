<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FastConnect Internet</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --green:#16A34A;--green-light:#DCFCE7;--green-dark:#14532D;
    --blue:#2563EB;--blue-light:#DBEAFE;--blue-dark:#1E3A8A;
    --orange:#EA580C;--orange-light:#FED7AA;
    --red:#DC2626;--red-light:#FEE2E2;
    --yellow:#CA8A04;--yellow-light:#FEF9C3;--yellow-bg:#FEFCE8;
    --gray:#64748B;--gray-light:#F1F5F9;--gray-border:#E2E8F0;
    --text:#0F172A;--text-muted:#64748B;--text-light:#94A3B8;
    --white:#FFFFFF;--bg:#F8FAFC;
    --radius:16px;--radius-sm:10px;
    --shadow:0 4px 24px rgba(0,0,0,0.12);--shadow-sm:0 2px 8px rgba(0,0,0,0.08);
    --font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  }
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;max-width:420px;margin:0 auto;position:relative;overflow-x:hidden;}

  .header{padding:28px 20px 24px;position:relative;overflow:hidden;background:linear-gradient(135deg,#2563EB 0%,#1D4ED8 100%);}
  .header::before{content:'';position:absolute;inset:0;opacity:0.12;background:repeating-linear-gradient(45deg,rgba(255,255,255,0.3) 0,rgba(255,255,255,0.3) 1px,transparent 0,transparent 50%);background-size:10px 10px;}
  .header-inner{position:relative;z-index:1;}
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .logo-icon{width:36px;height:36px;background:rgba(255,255,255,0.25);border-radius:10px;display:flex;align-items:center;justify-content:center;}
  .logo-icon svg{width:20px;height:20px;fill:white;}
  .logo-text{font-size:17px;font-weight:800;color:white;letter-spacing:-0.3px;}
  .header-title{font-size:26px;font-weight:800;color:white;line-height:1.2;letter-spacing:-0.5px;}
  .header-sub{font-size:13px;color:rgba(255,255,255,0.75);margin-top:4px;font-weight:500;}

  .content{padding:20px;}
  .section-title{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;}

  .plans-grid{display:flex;flex-direction:column;gap:12px;}
  .plan-card{background:var(--white);border:1.5px solid var(--gray-border);border-radius:var(--radius);padding:18px;transition:all 0.2s;position:relative;overflow:hidden;}
  .plan-card:hover{border-color:#93C5FD;box-shadow:var(--shadow-sm);}
  .plan-card.popular{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,0.08);}
  .popular-badge{position:absolute;top:0;right:0;background:var(--blue);color:white;font-size:10px;font-weight:800;letter-spacing:0.8px;text-transform:uppercase;padding:4px 12px;border-radius:0 var(--radius) 0 var(--radius-sm);}
  .plan-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .plan-name{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-0.3px;}
  .plan-price{text-align:right;}
  .plan-price-num{font-size:24px;font-weight:800;color:var(--blue);letter-spacing:-0.5px;}
  .plan-price-sub{font-size:11px;color:var(--text-muted);font-weight:500;}
  .plan-features{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .plan-feat{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--text-muted);}
  .plan-feat svg{width:13px;height:13px;fill:var(--green);}
  .pay-btn{width:100%;background:#9CA3AF;color:white;border:none;border-radius:10px;padding:13px;font-family:var(--font);font-size:14px;font-weight:700;cursor:not-allowed;display:flex;align-items:center;justify-content:center;gap:8px;opacity:0.7;}
  .mpesa-logo{background:rgba(255,255,255,0.2);border-radius:5px;padding:2px 6px;font-size:11px;font-weight:800;color:white;letter-spacing:0.5px;}

  .voucher-link{display:block;text-align:center;margin-top:20px;padding:14px;border:1.5px dashed var(--gray-border);border-radius:var(--radius-sm);font-size:13px;font-weight:600;color:var(--blue);cursor:pointer;transition:all 0.2s;background:transparent;width:100%;}
  .voucher-link:hover{background:var(--blue-light);border-color:var(--blue);}

  .coming-soon-badge{display:block;text-align:center;margin-top:16px;padding:12px;background:#FEF3C7;border-radius:10px;color:#D97706;font-size:13px;font-weight:600;}

  .toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:90%;max-width:360px;}
  .toast{background:var(--text);color:white;padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow);animation:toastIn 0.3s ease;}
  .toast.success{background:var(--green);}
  .toast.error{background:var(--red);}
  .toast.info{background:var(--blue);}
  @keyframes toastIn{from{transform:translateY(-10px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s;}
  .overlay.active{opacity:1;pointer-events:all;}
  .modal{background:white;border-radius:24px 24px 0 0;padding:28px 20px 40px;width:100%;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);position:relative;}
  .overlay.active .modal{transform:translateY(0);}
  .modal-handle{width:40px;height:4px;background:var(--gray-border);border-radius:100px;margin:0 auto 20px;}
  .modal-close{position:absolute;top:20px;right:20px;width:32px;height:32px;border-radius:50%;background:var(--gray-light);border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
  .modal-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:4px;}
  .modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:24px;}
  .input-label{font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px;display:block;}
  .phone-wrap{display:flex;gap:8px;}
  .phone-prefix{background:var(--gray-light);border:1.5px solid var(--gray-border);border-radius:var(--radius-sm);padding:0 14px;font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;white-space:nowrap;}
  .input{flex:1;border:1.5px solid var(--gray-border);border-radius:var(--radius-sm);padding:13px 14px;font-family:var(--font);font-size:15px;font-weight:600;color:var(--text);outline:none;width:100%;}
  .input:focus{border-color:var(--blue);}
  .input--mono{font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;}
  .input-hint{font-size:11px;color:var(--text-light);margin-top:6px;}
  .input-error{background:var(--red-light);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--red);font-weight:600;margin:12px 0;}
  .btn-submit{width:100%;background:var(--blue);color:white;border:none;border-radius:var(--radius-sm);padding:15px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:16px;}
  .btn-submit:hover{background:#1D4ED8;}
  .btn-submit:disabled{opacity:0.6;cursor:not-allowed;}
  .spinner{width:18px;height:18px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.35);border-top-color:white;animation:spin 0.8s linear infinite;flex-shrink:0;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="toast-container" id="toasts"></div>

<!-- MAIN CONTENT - ONLY PLANS PAGE -->
<div id="app">
  <div class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M1.293 8.395A14.9 14.9 0 0112 4c3.9 0 7.45 1.49 10.107 3.93l1.307-1.46A17 17 0 0012 2 16.9 16.9 0 00.001 6.876zM12 10a7 7 0 00-4.95 2.05L8.465 13.5A5 5 0 0112 12a5 5 0 013.535 1.5l1.414-1.45A7 7 0 0012 10zm0 4a3 3 0 00-2.121.879L12 17l2.121-2.121A3 3 0 0012 14z"/></svg>
        </div>
        <span class="logo-text">FastConnect Internet</span>
      </div>
      <div class="header-title">Get Connected</div>
      <div class="header-sub">Choose a plan and contact support to activate</div>
    </div>
  </div>

  <div class="content">
    <div class="section-title">Available Plans</div>
    <div class="plans-grid" id="plans-grid">
      <div class="plan-skeleton" style="height:130px;background:linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%);background-size:200% 100%;border-radius:16px;animation:shimmer 1.4s infinite;"></div>
      <div class="plan-skeleton" style="height:130px;background:linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%);background-size:200% 100%;border-radius:16px;animation:shimmer 1.4s infinite;"></div>
      <div class="plan-skeleton" style="height:130px;background:linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%);background-size:200% 100%;border-radius:16px;animation:shimmer 1.4s infinite;"></div>
    </div>
    <div class="coming-soon-badge">
      ⚡ Online payments coming soon. Contact support to activate your plan.
    </div>
    <button class="voucher-link" onclick="openVoucherModal()">
      🎟 Have a voucher? Redeem it here
    </button>
  </div>
</div>

<!-- VOUCHER MODAL -->
<div class="overlay" id="voucher-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal('voucher-modal')">×</button>
    <div class="modal-title">Redeem Voucher</div>
    <div class="modal-sub">Enter your voucher code to get connected</div>
    
    <label class="input-label">Voucher Code</label>
    <input type="text" id="voucher-input" placeholder="FC-XXXX-XXXX" maxlength="12" class="input input--mono" oninput="formatVoucher(this)">
    <div class="input-hint">Demo voucher: FC-DEMO-2024</div>
    
    <div id="voucher-error" class="input-error" style="display:none;"></div>
    <button class="btn-submit" onclick="redeemVoucher()">
      <span>Redeem Voucher</span>
    </button>
  </div>
</div>

<style>
  @keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
</style>

<script>
// ===== API CONFIGURATION =====
const API_BASE = 'https://fastconnect-backend.onrender.com';
let plans = [];

// ===== FETCH PLANS FROM API =====
async function fetchPlans() {
  try {
    const response = await fetch(`${API_BASE}/api/plans`);
    const data = await response.json();
    if (data.plans && data.plans.length > 0) {
      plans = data.plans;
      renderPlans();
    }
  } catch (err) {
    console.error('Failed to fetch plans', err);
    // Fallback to default plans if API fails
    plans = [
      {id:1, name:'2 Hours', duration_hours:2, price_kes:10, bandwidth_limit_mbps:2, is_popular:false},
      {id:2, name:'4 Hours', duration_hours:4, price_kes:15, bandwidth_limit_mbps:2, is_popular:false},
      {id:3, name:'8 Hours', duration_hours:8, price_kes:25, bandwidth_limit_mbps:2, is_popular:false},
      {id:4, name:'24 Hours', duration_hours:24, price_kes:40, bandwidth_limit_mbps:2, is_popular:true},
      {id:5, name:'Weekly', duration_hours:168, price_kes:200, bandwidth_limit_mbps:2, is_popular:false},
      {id:6, name:'Monthly', duration_hours:720, price_kes:600, bandwidth_limit_mbps:2, is_popular:false},
    ];
    renderPlans();
  }
}

// ===== RENDER PLANS =====
function renderPlans() {
  const grid = document.getElementById('plans-grid');
  if (!grid) return;
  
  grid.innerHTML = plans.map(plan => `
    <div class="plan-card ${plan.is_popular ? 'popular' : ''}">
      ${plan.is_popular ? '<div class="popular-badge">⭐ Popular</div>' : ''}
      <div class="plan-top">
        <div class="plan-name">${escapeHtml(plan.name)}</div>
        <div class="plan-price">
          <div class="plan-price-num">KES ${plan.price_kes}</div>
          <div class="plan-price-sub">one-time</div>
        </div>
      </div>
      <div class="plan-features">
        <span class="plan-feat">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="#16A34A"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          ${plan.duration_hours}h access
        </span>
        <span class="plan-feat">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="#16A34A"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          ${plan.bandwidth_limit_mbps} Mbps
        </span>
        <span class="plan-feat">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="#16A34A"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          Unlimited data
        </span>
      </div>
      <button class="pay-btn" disabled>
        <span class="mpesa-logo">M</span> Coming Soon
      </button>
    </div>
  `).join('');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ===== VOUCHER FUNCTIONS =====
function openVoucherModal() {
  document.getElementById('voucher-modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
  document.body.style.overflow = '';
}

function formatVoucher(el) {
  let val = el.value.replace(/[^A-Z0-9]/gi, '').toUpperCase();
  if (val.length > 2) val = val.slice(0,2) + '-' + val.slice(2);
  if (val.length > 7) val = val.slice(0,7) + '-' + val.slice(7);
  el.value = val.slice(0,12);
}

async function redeemVoucher() {
  const code = document.getElementById('voucher-input').value;
  const errEl = document.getElementById('voucher-error');
  
  if (!code) {
    errEl.textContent = 'Please enter a voucher code';
    errEl.style.display = 'block';
    setTimeout(() => errEl.style.display = 'none', 3000);
    return;
  }
  
  // Demo voucher
  if (code === 'FC-DEMO-2024') {
    closeModal('voucher-modal');
    toast('Voucher redeemed! 24 hours free access', 'success');
    setTimeout(() => {
      toast('Please contact support to activate your connection', 'info');
    }, 2000);
    document.getElementById('voucher-input').value = '';
    return;
  }
  
  // Try to redeem via API
  try {
    const response = await fetch(`${API_BASE}/api/vouchers/redeem`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ voucherCode: code, phone: '0712345678', deviceId: 'web_' + Date.now() })
    });
    
    const data = await response.json();
    
    if (data.success) {
      closeModal('voucher-modal');
      toast(`Voucher redeemed! ${data.planName} active.`, 'success');
      document.getElementById('voucher-input').value = '';
    } else {
      errEl.textContent = data.error || 'Invalid or expired voucher code';
      errEl.style.display = 'block';
      setTimeout(() => errEl.style.display = 'none', 3000);
    }
  } catch (err) {
    errEl.textContent = 'Connection error. Please try again.';
    errEl.style.display = 'block';
    setTimeout(() => errEl.style.display = 'none', 3000);
  }
}

// ===== TOAST =====
function toast(msg, type = 'info') {
  const container = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span style="font-size:14px;">${type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'}</span>${msg}`;
  container.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.3s';
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

// ===== CLOSE MODAL ON OVERLAY CLICK =====
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => {
    if (e.target === o) closeModal(o.id);
  });
});

// ===== INITIALIZE =====
fetchPlans();

// Poll for plan updates every 30 seconds
setInterval(fetchPlans, 30000);
</script>
</body>
</html>
