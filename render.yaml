services:
  - type: web
    name: fastconnect-backend
    runtime: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MPESA_ENVIRONMENT
        value: sandbox
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: BACKUP_ENCRYPTION_KEY
        generateValue: true
      - key: HOTSPOT_PROFILE
        value: fastconnect