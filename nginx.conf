# nginx/nginx.conf — FastConnect Production Nginx Configuration
# Place at: /etc/nginx/nginx.conf or mount in Docker

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    charset utf-8;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;
    server_tokens off;

    # Buffers
    client_body_buffer_size 16k;
    client_header_buffer_size 4k;
    client_max_body_size 100k;
    large_client_header_buffers 4 16k;

    # Timeouts
    client_body_timeout   30s;
    client_header_timeout 30s;
    send_timeout          30s;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss;

    # Security headers (applied globally)
    add_header X-Frame-Options           "DENY"                              always;
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header X-XSS-Protection          "1; mode=block"                     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' wss:; frame-ancestors 'none';" always;

    # Rate limiting zones
    limit_req_zone  $binary_remote_addr  zone=global:20m   rate=100r/m;
    limit_req_zone  $binary_remote_addr  zone=login:10m    rate=5r/m;
    limit_req_zone  $binary_remote_addr  zone=payment:10m  rate=3r/m;
    limit_req_zone  $binary_remote_addr  zone=admin:10m    rate=30r/m;
    limit_conn_zone $binary_remote_addr  zone=perip:10m;

    # Connection limiting
    limit_conn perip 20;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Upstream backends
    upstream api_backend {
        server backend:3000;
        keepalive 32;
    }

    upstream frontend_static {
        server frontend:80;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Captive Portal (wifi.fastconnect.co.ke) ───────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name wifi.fastconnect.co.ke;

        ssl_certificate     /etc/letsencrypt/live/wifi.fastconnect.co.ke/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/wifi.fastconnect.co.ke/privkey.pem;
        ssl_session_cache   shared:SSL:20m;
        ssl_session_timeout 4h;
        ssl_session_tickets off;

        # Strong SSL config
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_stapling              on;
        ssl_stapling_verify       on;
        resolver                  8.8.8.8 1.1.1.1 valid=300s;
        resolver_timeout          5s;

        # Serve React frontend (static)
        location / {
            limit_req zone=global burst=50 nodelay;
            proxy_pass         http://frontend_static;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # API proxy
        location /api/ {
            limit_req zone=global burst=20 nodelay;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # Payment endpoint — stricter rate limit
        location /api/payments/initiate {
            limit_req zone=payment burst=2 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # M-Pesa callback — allow only Safaricom IPs in production
        location /api/payments/mpesa-callback {
            # Uncomment in production to restrict to Safaricom IPs:
            # allow 196.201.214.200;
            # allow 196.201.214.206;
            # allow 196.201.213.114;
            # allow 196.201.214.207;
            # allow 196.201.214.208;
            # allow 196.201.213.44;
            # deny all;
            proxy_pass http://api_backend;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket upgrade
        location /ws/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Block access to sensitive paths
        location ~ /\. { deny all; }
        location = /favicon.ico { log_not_found off; access_log off; }
    }

    # ── Admin Panel (admin.fastconnect.co.ke) ─────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name admin.fastconnect.co.ke;

        ssl_certificate     /etc/letsencrypt/live/admin.fastconnect.co.ke/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.fastconnect.co.ke/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_session_cache   shared:AdminSSL:5m;

        # Optional IP whitelist — uncomment and set your office IP
        # allow 41.90.xxx.xxx;    # Office IP
        # deny all;

        # Serve admin React build
        location / {
            limit_req zone=admin burst=30 nodelay;
            proxy_pass http://frontend_static;
            proxy_set_header Host $host;
        }

        # Admin API calls
        location /api/admin/ {
            limit_req zone=admin burst=30 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin login — strict rate limit
        location /api/admin/auth/login {
            limit_req zone=login burst=2 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Admin WebSocket
        location /ws/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 86400s;
        }
    }
}
