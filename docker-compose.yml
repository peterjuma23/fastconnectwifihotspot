version: '3.8'

# ============================================================
# FastConnect Internet — Docker Compose (Production)
# ============================================================

services:

  # ── MySQL 8.0 ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: fc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      fastconnect_db
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks: [fastconnect]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=200
      --innodb-buffer-pool-size=256M
      --slow-query-log=1
      --long-query-time=2
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ── Redis 7 ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fc-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks: [fastconnect]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "2" }

  # ── Node.js Backend API ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: fc-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV:   production
      PORT:       3000
      DB_HOST:    mysql
      REDIS_URL:  redis://:${REDIS_PASSWORD}@redis:6379
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
    networks: [fastconnect]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "5" }

  # ── React Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${FRONTEND_URL}
        REACT_APP_WS_URL:  ${WEBSOCKET_URL}
    container_name: fc-frontend
    restart: unless-stopped
    networks: [fastconnect]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health.txt"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "2" }

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: fc-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - letsencrypt_certs:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    networks: [fastconnect]
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "5" }

  # ── Certbot (Let's Encrypt) ──────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: fc-certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - letsencrypt_certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do
        certbot renew --quiet --webroot --webroot-path=/var/www/certbot;
        sleep 12h & wait $${!};
      done"
    networks: [fastconnect]

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  certbot_webroot:
    driver: local
  letsencrypt_certs:
    driver: local
  nginx_logs:
    driver: local

networks:
  fastconnect:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
